<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Educa</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="center-body">
    <header style="position: absolute;">
        <nav class="container">
            <div class="logo"><a href="index.html" style="color: inherit; text-decoration: none;">Educa<span>.</span></a></div>
        </nav>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
                <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Sign Up</button>
            </div>

            <form id="auth-form" class="auth-form" onsubmit="handleLogin(event)">
                <h2 id="form-title">Welcome Back</h2>
                
                <div class="input-group hidden" id="name-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name">
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn primary-btn full-width" id="submit-btn">Log In</button>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
